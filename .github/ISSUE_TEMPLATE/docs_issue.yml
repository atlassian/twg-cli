name: Docs issue
description: Report unclear or missing public documentation.
title: "[Docs]: "
labels: ["docs", "needs-triage"]
body:
  - type: input
    id: page
    attributes:
      label: Page or topic
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is unclear or missing?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement

